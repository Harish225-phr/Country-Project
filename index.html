<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@200;300;400;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css">
</head>

<body style="background-color: rgba(182, 180, 180, 0.189)">

    <!-- Haeder -->
    <header>
        <!-- Header  -->
        <nav class="navbar bg-light border border-white shadow-sm">
            <div class="container">
                <h6 class="fw-bold fs-4">Where is the world</h6>
                <div class="d-flex align-items-center mode-change">
                <i class="fa-regular fa-moon fav-icon"></i>
                <h6 class="fs-6 m-0 mode-text">Dark Mode</h6>
            </div>
        </nav>
    </header>


    <!-- Input Area -->
    <div class="container mt-5 mb-5">

        <!-- Search + Filter -->
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-5">

            <!-- Search -->
            <form class="w-50">
                <input class="form-control shadow-sm p-3 border-0 searchInput" type="search" placeholder="Search for a country..."
                    aria-label="Search">
            </form>

            <!-- Dropdown -->
            <div class="dropdown">
                <button class="btn btn-light dropdown-toggle shadow-sm p-3 border-0" type="button"
                    data-bs-toggle="dropdown" aria-expanded="false">

                    Filter by Region
                </button>

                <ul class="dropdown-menu">
                </ul>
            </div>

        </div>

        <!-- Card Area -->
        <div class="row g-4">

            <!-- Card 1 -->
             
            <div class="col-lg-3 col-md-6 Allcards template" style="display:none;">
                <div class="card shadow-sm border-0 h-100 ">
                    <img src="https://flagcdn.com/w320/de.png" class="card-img-top" alt="Germany Flag">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3 country-name">Germany</h5>

                        <p class="mb-1">
                            <strong>Population:</strong> <span class="country-population">81,770,900</span>
                        </p>

                        <p class="mb-1">
                            <strong>Region:</strong> <span class="country-region">Europe</span>
                        </p>

                        <p class="mb-0">
                            <strong>Capital:</strong> <span class="country-capital">Berlin</span>
                        </p>
                    </div>

                </div>
            </div>


        </div>

    </div>



    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
    <script src="./script.js"></script>
</body>

</html>
