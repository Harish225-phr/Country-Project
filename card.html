<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@200;300;400;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css">
</head>

<body style="background-color: rgba(182, 180, 180, 0.189)">
    <!-- Haeder -->
    <header>
        <!-- Header  -->
        <nav class="navbar bg-light border border-white shadow-sm">
            <div class="container">
                <h6 class="fw-bold fs-4">Where is the world</h6>
                <div class="d-flex align-items-center mode-change">
                <i class="fa-regular fa-moon fav-icon"></i>
                <h6 class="fs-6 m-0 mode-text">Dark Mode</h6>
            </div>
        </nav>
    </header>


    <!-- Country Details Section -->
<section class="container py-5">
    <!-- Back Button -->
     <a href="./index.html">
         <button class="btn bg-white shadow-sm px-4 mb-5 back-button">
        <i class="fa-solid fa-arrow-left me-2"></i>Back
    </button>
     </a>
   

    <div class="row align-items-center g-5">
        
        <!-- Flag -->
        <div class="col-lg-6">
            <img src="https://flagcdn.com/w640/be.png"
     alt="Belgium Flag"
     class="img-fluid shadow card-image"
     style="width: 100%; height: 400px; object-fit: cover; border-radius: 8px;">
        </div>

        <!-- Country Info -->
        <div class="col-lg-6">
            <h2 class="fw-bold mb-4 country-name">Belgium</h2>

            <div class="row">
                <!-- Left Info -->
                <div class="col-md-10">
                    <p><strong>Descprition:</strong> <span class="country-desc"></span></p>
                    <p><strong>Population:</strong> <span class="country-population"></span></p>
                    <p><strong>Region:</strong> <span class="country-region"></span></p>
                    <p><strong>Capital:</strong> <span class="country-capital"></span></p>
                </div>
            </div>

            <!-- Border Countries -->
            <div class="d-flex flex-wrap align-items-center mt-4 gap-2 brder-country-container">
                <strong class="me-2">Border Countries:</strong>
            </div>
        </div>
    </div>
</section>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
    <script src="./card.js"></script>
</body>

</html>
